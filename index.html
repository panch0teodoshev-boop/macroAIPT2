/* ============================================================
   ПОМОЩНИ ФУНКЦИИ
   ============================================================ */
const uid = () => Math.random().toString(36).slice(2, 10);

function mifflinBMR({ sex, weight, height, age }) {
  const base = 10 * weight + 6.25 * height - 5 * age;
  return sex === "female" ? base - 161 : base + 5;
}

function computePlan(profile, macros) {
  const bmr = mifflinBMR(profile);
  const mult = ACTIVITY.find((a) => a.id === profile.activity)?.mult ?? 1.2;
  const tdee = bmr * mult;
  let calories;
  if (profile.manualCalories != null && profile.manualCalories !== "") {
    calories = Number(profile.manualCalories);
  } else {
    const delta = GOALS.find((g) => g.id === profile.goal)?.delta ?? 0;
    calories = tdee + delta;
  }
  calories = Math.max(0, Math.round(calories));
  return {
    bmr, tdee, calories,
    protein: (calories * macros.protein) / 100 / 4,
    carbs: (calories * macros.carbs) / 100 / 4,
    fat: (calories * macros.fat) / 100 / 9,
  };
}

// Превръща "1/2", "3/4", "1.5", "2 бр" в число
function parseQty(s) {
  if (typeof s === "number") return s;
  if (s == null) return 0;
  const clean = String(s).replace(",", ".").replace(/[^0-9./]/g, "");
  if (clean.includes("/")) {
    const [a, b] = clean.split("/");
    const n = parseFloat(a) / parseFloat(b);
    return isFinite(n) ? n : 0;
  }
  const n = parseFloat(clean);
  return isFinite(n) ? n : 0;
}

const round = (n, d = 1) => {
  const m = Math.pow(10, d);
  return Math.round((n + Number.EPSILON) * m) / m;
};
const fmt = (n, d = 1) => {
  if (n == null || isNaN(n)) return "0";
  const r = round(n, d);
  return Number.isInteger(r) ? String(r) : String(r);
};
const unitLabel = (u) => (u === "piece" ? "1 бр" : "100 g");

// Дати
const iso = (d) => {
  const x = new Date(d);
  return `${x.getFullYear()}-${String(x.getMonth() + 1).padStart(2, "0")}-${String(x.getDate()).padStart(2, "0")}`;
};
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
const mondayOf = (d) => {
  const x = new Date(d);
  const wd = (x.getDay() + 6) % 7; // 0 = понеделник
  return addDays(x, -wd);
};
const longDate = (d, lang = "bg") => { const x = new Date(d); return `${DAYS[lang][(x.getDay() + 6) % 7]}, ${x.getDate()} ${MONTHS[lang][x.getMonth()]}`; };

// Сметки за списък хранения
// За продукти на 100 г количеството (qty) е в ГРАМОВЕ → коефициент = грамове / 100.
// За продукти "на брой" qty е броят парчета.
function entryFactor(product, qty) {
  return product.unit === "piece" ? qty : qty / 100;
}
function entryTotals(entry, products) {
  // AI / свободен запис със собствени стойности (qty = множител порции)
  if (entry.custom) {
    const q = entry.qty || 1;
    const c = entry.custom;
    return { cal: c.cal * q, protein: c.protein * q, carbs: c.carbs * q, fat: c.fat * q };
  }
  const p = products.find((x) => x.id === entry.productId);
  if (!p) return { cal: 0, protein: 0, carbs: 0, fat: 0 };
  const f = entryFactor(p, entry.qty);
  return { cal: p.cal * f, protein: p.protein * f, carbs: p.carbs * f, fat: p.fat * f };
}
// Подразбиращо се количество и етикет според вида на продукта
const defaultAmount = (p) => (p.unit === "piece" ? 1 : 100);
const amountLabel = (p, qty) => (p.unit === "piece" ? `${fmt(qty)} бр` : `${fmt(qty, 0)} г`);
const clampGrams = (n) => Math.min(200, Math.max(1, Math.round(n)));
function sumTotals(list) {
  return list.reduce((a, b) => ({
    cal: a.cal + b.cal, protein: a.protein + b.protein,
    carbs: a.carbs + b.carbs, fat: a.fat + b.fat,
  }), { cal: 0, protein: 0, carbs: 0, fat: 0 });
}
const emptyDay = () => ({ breakfast: [], lunch: [], dinner: [], snack: [] });

// ---- микронутриенти ----
const zeroMicros = () => MICRO_KEYS.reduce((o, k) => ((o[k] = 0), o), {});
const getProductMicros = (p) => (p && (p.micros || PRODUCT_MICROS[p.id])) || null;
function entryMicros(entry, products) {
  const out = zeroMicros();
  if (entry.custom) {
    const q = entry.qty || 1;
    const m = entry.custom.micros;
    if (m) MICRO_KEYS.forEach((k) => (out[k] = (Number(m[k]) || 0) * q));
    return out;
  }
  const p = products.find((x) => x.id === entry.productId);
  const m = getProductMicros(p);
  if (!p || !m) return out;
  const f = entryFactor(p, entry.qty);
  MICRO_KEYS.forEach((k) => (out[k] = (Number(m[k]) || 0) * f));
  return out;
}
function sumMicros(list) {
  const out = zeroMicros();
  list.forEach((m) => MICRO_KEYS.forEach((k) => (out[k] += m[k] || 0)));
  return out;
}
function dayMicros(entries, products) {
  return sumMicros(entries.map((e) => entryMicros(e, products)));
}

// ---- рецепти ----
function recipeTotals(recipe, products) {
  const macro = sumTotals((recipe.ingredients || []).map((ing) => entryTotals({ productId: ing.productId, qty: ing.qty }, products)));
  const micro = sumMicros((recipe.ingredients || []).map((ing) => entryMicros({ productId: ing.productId, qty: ing.qty }, products)));
  const s = Math.max(1, recipe.servings || 1);
  const per = { cal: macro.cal / s, protein: macro.protein / s, carbs: macro.carbs / s, fat: macro.fat / s };
  const perMicro = {}; MICRO_KEYS.forEach((k) => (perMicro[k] = micro[k] / s));
  return { total: macro, micro, per, perMicro, servings: s };
}

const hasStorage = () => typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";

/* ============================================================
   STORE (Context API)
   ============================================================ */
const StoreCtx = createContext(null);
const useStore = () => useContext(StoreCtx);

function StoreProvider({ children }) {
  const [state, setState] = useState(initialState);
  const [loaded, setLoaded] = useState(false);
  const saveTimer = useRef(null);

  // зареждане
  useEffect(() => {
    let alive = true;
    (async () => {
      if (hasStorage()) {
        try {
          const r = await window.storage.get(STORAGE_KEY);
          if (alive && r && r.value) {
            const parsed = JSON.parse(r.value);
            setState((s) => ({ ...s, ...parsed }));
          }
        } catch (e) { /* първо стартиране или липсва ключ */ }
      }
      if (alive) setLoaded(true);
    })();
    return () => { alive = false; };
  }, []);

  // запис (с debounce)
  useEffect(() => {
    if (!loaded || !hasStorage()) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try { await window.storage.set(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* игнор */ }
    }, 400);
    return () => saveTimer.current && clearTimeout(saveTimer.current);
  }, [state, loaded]);

  const patch = useCallback((fn) => setState((s) => ({ ...s, ...fn(s) })), []);

  const actions = useMemo(() => ({
    setProfile: (p) => patch((s) => ({ profile: { ...s.profile, ...p } })),
    finishSetup: () => patch(() => ({ profileSetupDone: true })),
    setMacros: (m) => patch((s) => ({ macros: { ...s.macros, ...m } })),

    addProduct: (prod) => patch((s) => ({ products: [{ ...prod, id: uid() }, ...s.products] })),
    updateProduct: (id, prod) => patch((s) => ({ products: s.products.map((x) => (x.id === id ? { ...x, ...prod } : x)) })),
    deleteProduct: (id) => patch((s) => ({ products: s.products.filter((x) => x.id !== id) })),

    setSelectedDate: (d) => patch(() => ({ selectedDate: d })),
    setLang: (l) => patch(() => ({ lang: l })),
    setWeight: (date, kg) => patch((s) => ({ weights: { ...(s.weights || {}), [date]: kg } })),
    deleteWeight: (date) => patch((s) => { const w = { ...(s.weights || {}) }; delete w[date]; return { weights: w }; }),
    setWeekStart: (d) => patch(() => ({ weekStart: d })),

    addEntry: (date, meal, productId, qty) => patch((s) => {
      const day = s.diary[date] ? { ...s.diary[date] } : emptyDay();
      day[meal] = [...day[meal], { id: uid(), productId, qty }];
      return { diary: { ...s.diary, [date]: day } };
    }),
    addCustomEntry: (date, meal, custom) => patch((s) => {
      const day = s.diary[date] ? { ...s.diary[date] } : emptyDay();
      day[meal] = [...day[meal], { id: uid(), custom, qty: 1 }];
      return { diary: { ...s.diary, [date]: day } };
    }),
    updateEntry: (date, meal, entryId, qty) => patch((s) => {
      const day = { ...(s.diary[date] || emptyDay()) };
      day[meal] = day[meal].map((e) => (e.id === entryId ? { ...e, qty } : e));
      return { diary: { ...s.diary, [date]: day } };
    }),
    deleteEntry: (date, meal, entryId) => patch((s) => {
      const day = { ...(s.diary[date] || emptyDay()) };
      day[meal] = day[meal].filter((e) => e.id !== entryId);
      return { diary: { ...s.diary, [date]: day } };
    }),

    // рецепти
    addRecipe: (r) => patch((s) => ({ recipes: [{ ...r, id: uid() }, ...(s.recipes || [])] })),
    updateRecipe: (id, r) => patch((s) => ({ recipes: (s.recipes || []).map((x) => (x.id === id ? { ...x, ...r } : x)) })),
    deleteRecipe: (id) => patch((s) => ({ recipes: (s.recipes || []).filter((x) => x.id !== id) })),
    toggleFavRecipe: (id) => patch((s) => ({ recipes: (s.recipes || []).map((x) => (x.id === id ? { ...x, favorite: !x.favorite } : x)) })),
    duplicateRecipe: (id) => patch((s) => {
      const r = (s.recipes || []).find((x) => x.id === id); if (!r) return {};
      const copy = { ...r, id: uid(), favorite: false, name: r.name + " (копие)", nameEn: r.nameEn ? r.nameEn + " (copy)" : undefined };
      return { recipes: [copy, ...s.recipes] };
    }),
    // логване на рецепта като свободен запис в дневника
    logRecipe: (date, meal, recipe, servingsEaten, products) => patch((s) => {
      const rt = recipeTotals(recipe, products);
      const k = servingsEaten || 1;
      const micros = {}; MICRO_KEYS.forEach((mk) => (micros[mk] = rt.perMicro[mk] * k));
      const custom = {
        name: (s.lang === "en" && recipe.nameEn ? recipe.nameEn : recipe.name),
        cal: rt.per.cal * k, protein: rt.per.protein * k, carbs: rt.per.carbs * k, fat: rt.per.fat * k, micros,
      };
      const day = s.diary[date] ? { ...s.diary[date] } : emptyDay();
      day[meal] = [...day[meal], { id: uid(), custom, qty: 1 }];
      return { diary: { ...s.diary, [date]: day } };
    }),

    // предпочитания
    setPrefs: (p) => patch((s) => ({ prefs: { ...(s.prefs || {}), ...p } })),
    // AI чат
    pushChat: (msg) => patch((s) => ({ chat: [...(s.chat || []), msg] })),
    clearChat: () => patch(() => ({ chat: [] })),

    addManual: (text) => patch((s) => ({ shopping: { ...s.shopping, manual: [...s.shopping.manual, { id: uid(), text, checked: false }] } })),
    toggleManual: (id) => patch((s) => ({ shopping: { ...s.shopping, manual: s.shopping.manual.map((m) => (m.id === id ? { ...m, checked: !m.checked } : m)) } })),
    deleteManual: (id) => patch((s) => ({ shopping: { ...s.shopping, manual: s.shopping.manual.filter((m) => m.id !== id) } })),
    toggleAuto: (name) => patch((s) => ({ shopping: { ...s.shopping, autoChecked: { ...s.shopping.autoChecked, [name]: !s.shopping.autoChecked[name] } } })),

    importState: (obj) => setState((s) => ({ ...s, ...obj })),
    importProducts: (list) => patch((s) => ({ products: [...list, ...s.products] })),
    reset: () => setState(initialState()),
  }), [patch]);

  return <StoreCtx.Provider value={{ state, actions, loaded }}>{children}</StoreCtx.Provider>;
}

          <StatTile label={tr("multiplier")} value={ACTIVITY.find((a) => a.id === profile.activity)?.mult} unit="" />
          <StatTile label={tr("tdee")} value={fmt(plan.tdee)} unit={tr("kcal")} highlight />
        </div>
      </Card>

      <Card>
        <div style={{ fontWeight: 700, color: t.ink, marginBottom: 10 }}>{tr("goal")}</div>
        <Segmented value={profile.goal} onChange={(v) => actions.setProfile({ goal: v })}
          options={GOALS.map((g) => ({ value: g.id, label: lab(g) }))} />
        <div style={{ marginTop: 14 }}>
          <Field label={tr("manualCalories")}>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
              <input type="checkbox" checked={useManual} onChange={(e) => actions.setProfile({ manualCalories: e.target.checked ? Math.round(plan.tdee) : null })}
                style={{ width: 18, height: 18, accentColor: t.coral }} />
              {useManual && <NumInput width={90} value={profile.manualCalories} onChange={(v) => actions.setProfile({ manualCalories: v })} suffix={tr("kcal")} />}
            </span>
          </Field>
        </div>
        <div style={{ marginTop: 14, background: t.tealDark, borderRadius: 12, padding: "16px 18px", textAlign: "center", color: "#fff" }}>
          <div style={{ fontSize: 13, opacity: 0.85 }}>{tr("dailyGoal")}</div>
          <div style={{ fontSize: 34, fontWeight: 800, lineHeight: 1.1 }}>{fmt(plan.calories, 0)}</div>
          <div style={{ fontSize: 12, opacity: 0.8 }}>{tr("kcalPerDay")}</div>
        </div>
      </Card>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <span style={{ fontWeight: 700, color: t.ink }}>{tr("macroSplit")}</span>
          <span style={{ fontSize: 12.5, fontWeight: 700, color: macroOk ? t.good : t.warn }}>
            {tr("sum")}: {macroSum}% {macroOk ? "✓" : "≠ 100%"}
          </span>
        </div>
        <Field label={<span style={{ color: t.protein }}>● {tr("protein")}</span>}>
          <NumInput width={80} value={macros.protein} onChange={(v) => actions.setMacros({ protein: Number(v) })} suffix="%" />
        </Field>
        <Field label={<span style={{ color: t.carbs }}>● {tr("carbs")}</span>}>
          <NumInput width={80} value={macros.carbs} onChange={(v) => actions.setMacros({ carbs: Number(v) })} suffix="%" />
        </Field>
        <Field label={<span style={{ color: t.fat }}>● {tr("fat")}</span>}>
          <NumInput width={80} value={macros.fat} onChange={(v) => actions.setMacros({ fat: Number(v) })} suffix="%" />
        </Field>
        {!macroOk && (
          <div style={{ marginTop: 10, fontSize: 12.5, color: t.warn, display: "flex", gap: 6, alignItems: "center" }}>
            <AlertTriangle size={14} /> {tr("macroWarn")}
          </div>
        )}
        <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
          <StatTile label={tr("protein")} value={fmt(plan.protein)} unit={tr("g")} color={t.protein} />
          <StatTile label={tr("carbsS")} value={fmt(plan.carbs)} unit={tr("g")} color={t.carbs} />
          <StatTile label={tr("fat")} value={fmt(plan.fat)} unit={tr("g")} color={t.fat} />
        </div>
      </Card>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <SectionBar>{tr("activityLevels")}</SectionBar>
        <div>
          {ACTIVITY.map((a, i) => (
            <div key={a.id} style={{ display: "flex", gap: 10, padding: "10px 14px", borderBottom: i < ACTIVITY.length - 1 ? `1px solid ${t.line}` : "none", background: i % 2 ? t.bgSoft : "#fff" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600, color: t.ink }}>{lab(a)}</div>
                <div style={{ fontSize: 12, color: t.muted, marginTop: 2 }}>{L === "en" ? a.defEn : a.def}</div>
              </div>
              <div style={{ fontWeight: 800, color: t.teal, fontSize: 15, alignSelf: "center" }}>{a.mult}</div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function StatTile({ label, value, unit, highlight, color }) {
  return (
    <div style={{ flex: 1, background: highlight ? t.coralLight : t.tealPale, borderRadius: 12, padding: "12px 8px", textAlign: "center" }}>
      <div style={{ fontSize: 11.5, color: color || t.muted, fontWeight: 700, marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 800, color: highlight ? t.coralDark : (color || t.ink), lineHeight: 1 }}>{value}</div>
      {unit && <div style={{ fontSize: 10.5, color: t.muted, marginTop: 2 }}>{unit}</div>}
    </div>
  );
}

/* ============================================================
   ЕКРАН 3 — ДНЕВНИК
   ============================================================ */
function DiaryScreen() {
  const { state, actions } = useStore();
  const { products, selectedDate } = state;
  const plan = computePlan(state.profile, state.macros);
  const day = state.diary[selectedDate] || emptyDay();
  const [adding, setAdding] = useState(null); // meal id
  const [aiMeal, setAiMeal] = useState(null); // meal id за AI
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  const lab = (o) => (L === "en" ? o.labelEn : o.label);

  const mealTotals = MEALS.map((m) => ({ ...m, totals: sumTotals(day[m.id].map((e) => entryTotals(e, products))) }));
  const dayTotal = sumTotals(mealTotals.map((m) => m.totals));

  const pct = (v, p) => (p > 0 ? Math.round((v / p) * 100) : 0);
  const remaining = { cal: plan.calories - dayTotal.cal, protein: plan.protein - dayTotal.protein, carbs: plan.carbs - dayTotal.carbs, fat: plan.fat - dayTotal.fat };

  const donutData = [
    { name: tr("protein"), value: round(dayTotal.protein), color: t.protein },
    { name: tr("carbsS"), value: round(dayTotal.carbs), color: t.carbs },
    { name: tr("fat"), value: round(dayTotal.fat), color: t.fat },
  ];
  const hasFood = dayTotal.cal > 0;

  return (
    <div style={{ display: "grid", gap: 14 }}>
      {/* избор на ден */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: t.tealDark, borderRadius: 12, padding: "8px 10px", color: "#fff" }}>
        <button onClick={() => actions.setSelectedDate(iso(addDays(selectedDate, -1)))} style={navBtn}><ChevronLeft size={20} /></button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>{longDate(selectedDate, L)}</div>
          <button onClick={() => actions.setSelectedDate(iso(new Date()))} style={{ background: "none", border: "none", color: t.tealLight, fontSize: 11, cursor: "pointer", marginTop: 1 }}>{tr("today")}</button>
        </div>
        <button onClick={() => actions.setSelectedDate(iso(addDays(selectedDate, 1)))} style={navBtn}><ChevronRight size={20} /></button>
      </div>

      {/* обобщение */}
      <Card>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, textAlign: "center" }}>
          {[
            { l: tr("calories"), v: fmt(dayTotal.cal, 0), p: pct(dayTotal.cal, plan.calories), c: t.tealDark },
            { l: tr("protein"), v: fmt(dayTotal.protein), p: pct(dayTotal.protein, plan.protein), c: t.protein },
            { l: tr("carbsS"), v: fmt(dayTotal.carbs), p: pct(dayTotal.carbs, plan.carbs), c: t.carbs },
            { l: tr("fat"), v: fmt(dayTotal.fat), p: pct(dayTotal.fat, plan.fat), c: t.fat },
          ].map((x) => (
            <div key={x.l}>
              <div style={{ fontSize: 11, color: t.muted, fontWeight: 700 }}>{x.l}</div>
              <div style={{ fontSize: 19, fontWeight: 800, color: x.c }}>{x.v}</div>
              <div style={{ fontSize: 10.5, color: t.muted }}>{x.p}%</div>
            </div>
          ))}
        </div>
        <div style={{ height: 1, background: t.line, margin: "12px 0" }} />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, textAlign: "center" }}>
          {[
            { l: tr("remainingKcal"), v: fmt(remaining.cal, 0) },
            { l: tr("protein"), v: fmt(remaining.protein) },
            { l: tr("carbsS"), v: fmt(remaining.carbs) },
            { l: tr("fat"), v: fmt(remaining.fat) },
          ].map((x) => (
            <div key={x.l}>
              <div style={{ fontSize: 10, color: t.muted }}>{x.l}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: Number(x.v) < 0 ? t.warn : t.good }}>{x.v}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* donut за деня */}
      <Card>
        <div style={{ fontWeight: 700, color: t.ink, marginBottom: 4, fontSize: 14 }}>{tr("macroSplitG")}</div>
        {hasFood ? (
          <div style={{ height: 210 }}>
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={donutData} dataKey="value" nameKey="name" innerRadius={55} outerRadius={85} paddingAngle={2} stroke="none">
                  {donutData.map((d, i) => <Cell key={i} fill={d.color} />)}
                </Pie>
                <Tooltip formatter={(v, n) => [`${fmt(v)} ${tr("g")}`, n]} contentStyle={tooltipStyle} />
                <Legend verticalAlign="bottom" iconType="circle" wrapperStyle={{ fontSize: 12 }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
        ) : <EmptyHint text={tr("addFoodsHint")} />}
      </Card>

      {/* хранения */}
      {mealTotals.map((m) => (
        <Card key={m.id} style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: t.coral, color: "#fff", padding: "9px 14px" }}>
            <span style={{ fontWeight: 700, fontSize: 14 }}>{lab(m)}</span>
            <span style={{ fontSize: 12.5, fontWeight: 600, opacity: 0.95 }}>{fmt(m.totals.cal, 0)} {tr("kcal")}</span>
          </div>
          {day[m.id].length === 0 && <div style={{ padding: "14px", color: t.muted, fontSize: 13, textAlign: "center" }}>{tr("noProductsAdded")}</div>}
          {day[m.id].map((e) => {
            const isCustom = !!e.custom;
            const p = isCustom ? null : products.find((x) => x.id === e.productId);
            if (!isCustom && !p) return null;
            const tot = entryTotals(e, products);
            const isPiece = !isCustom && p.unit === "piece";
            const name = isCustom ? e.custom.name : productName(p, L);
            return (
              <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 14px", borderBottom: `1px solid ${t.line}` }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: t.ink, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {isCustom && <Sparkles size={11} color={t.coral} style={{ marginRight: 4, verticalAlign: "middle" }} />}{name}
                  </div>
                  <div style={{ fontSize: 11.5, color: t.muted }}>{tr("pS")} {fmt(tot.protein)} · {tr("cS")} {fmt(tot.carbs)} · {tr("fS")} {fmt(tot.fat)}</div>
                </div>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 3 }}>
                  <input value={e.qty}
                    onChange={(ev) => {
                      const raw = Number(ev.target.value) || 0;
                      const val = (isCustom || isPiece) ? Math.max(1, raw) : clampGrams(raw);
                      actions.updateEntry(selectedDate, m.id, e.id, val);
                    }}
                    style={{ ...inputStyle, width: 58, textAlign: "center", padding: "6px" }}
                    type="number" inputMode="numeric"
                    min={1} max={(isCustom || isPiece) ? undefined : 200} step={(isCustom || isPiece) ? 1 : 5} />
                  <span style={{ fontSize: 11, color: t.muted, width: 14 }}>{isCustom ? "×" : (isPiece ? tr("pc") : tr("g"))}</span>
                </span>
                <div style={{ width: 50, textAlign: "right", fontWeight: 700, color: t.ink, fontSize: 13.5 }}>{fmt(tot.cal, 0)}</div>
                <button onClick={() => actions.deleteEntry(selectedDate, m.id, e.id)} style={{ border: "none", background: "none", cursor: "pointer", color: t.muted, padding: 4 }}><Trash2 size={16} /></button>
              </div>
            );
          })}
          <div style={{ display: "flex", borderTop: `1px solid ${t.line}` }}>
            <button onClick={() => setAdding(m.id)} style={{ flex: 1, border: "none", background: t.tealPale, color: t.tealDark, fontFamily: FONT, fontWeight: 600, fontSize: 13.5, padding: "11px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
              <Plus size={16} /> {tr("addProductBtn")}
            </button>
            <button onClick={() => setAiMeal(m.id)} style={{ width: 92, border: "none", borderLeft: `1px solid ${t.line}`, background: t.coralLight, color: t.coralDark, fontFamily: FONT, fontWeight: 700, fontSize: 13.5, padding: "11px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
              <Sparkles size={15} /> {tr("aiBtn")}
            </button>
          </div>
        </Card>
      ))}

      {adding && <AddEntryModal meal={MEALS.find((m) => m.id === adding)} products={products}
        onClose={() => setAdding(null)}
        onAdd={(pid, qty) => { actions.addEntry(selectedDate, adding, pid, qty); setAdding(null); }} />}

      {aiMeal && <AIModal meal={MEALS.find((m) => m.id === aiMeal)} lang={L}
        onClose={() => setAiMeal(null)}
        onAdd={(items) => { items.forEach((it) => actions.addCustomEntry(selectedDate, aiMeal, it)); setAiMeal(null); }} />}
    </div>
  );
}

function AddEntryModal({ meal, products, onClose, onAdd }) {
  const { state } = useStore();
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  const lab = (o) => (L === "en" ? o.labelEn : o.label);
  const [q, setQ] = useState("");
  const [picked, setPicked] = useState(null);
  const [qty, setQty] = useState(100);
  const filtered = products.filter((p) => (p.name + " " + (p.nameEn || "")).toLowerCase().includes(q.trim().toLowerCase())).slice(0, 40);

  const pick = (p) => { setPicked(p); setQty(defaultAmount(p)); };
  const isPiece = picked && picked.unit === "piece";
  const f = picked ? entryFactor(picked, qty) : 0;
  const uLabel = (p) => (p.unit === "piece" ? tr("pc1") : tr("g100"));

  return (
    <Modal title={`${lab(meal)} — ${tr("addTo")}`} onClose={onClose}>
      {!picked ? (
        <>
          <div style={{ display: "flex", alignItems: "center", gap: 8, background: t.bgSoft, border: `1px solid ${t.line}`, borderRadius: 11, padding: "0 12px", marginBottom: 10 }}>
            <Search size={17} color={t.muted} />
            <input autoFocus value={q} onChange={(e) => setQ(e.target.value)} placeholder={tr("searchProduct")}
              style={{ border: "none", outline: "none", fontFamily: FONT, fontSize: 15, padding: "11px 0", flex: 1, background: "transparent", color: t.ink }} />
          </div>
          <div style={{ maxHeight: "50vh", overflowY: "auto" }}>
            {filtered.map((p) => (
              <button key={p.id} onClick={() => pick(p)} style={{ width: "100%", textAlign: "left", border: "none", borderBottom: `1px solid ${t.line}`, background: "#fff", padding: "11px 4px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", fontFamily: FONT }}>
                <span style={{ fontSize: 14, color: t.ink, fontWeight: 600 }}>{productName(p, L)}</span>
                <span style={{ fontSize: 12, color: t.muted }}>{p.cal} {tr("kcal")} / {uLabel(p)}</span>
              </button>
            ))}
          </div>
        </>
      ) : (
        <div>
          <div style={{ background: t.tealPale, borderRadius: 12, padding: 14, marginBottom: 14 }}>
            <div style={{ fontWeight: 700, color: t.ink, fontSize: 15 }}>{productName(picked, L)}</div>
            <div style={{ fontSize: 12.5, color: t.muted, marginTop: 2 }}>{tr("perUnit")} {uLabel(picked)}: {picked.cal} {tr("kcal")} · {tr("pS")} {picked.protein} · {tr("cS")} {picked.carbs} · {tr("fS")} {picked.fat}</div>
          </div>

          {isPiece ? (
            <Field label={tr("count")}>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 10 }}>
                <button onClick={() => setQty((x) => Math.max(1, x - 1))} style={stepBtn}><Minus size={16} /></button>
                <span style={{ minWidth: 34, textAlign: "center", fontSize: 18, fontWeight: 800, color: t.ink }}>{qty}</span>
                <button onClick={() => setQty((x) => x + 1)} style={stepBtn}><Plus size={16} /></button>
              </span>
            </Field>
          ) : (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: t.ink }}>{tr("amount")}</span>
                <span><span style={{ fontSize: 22, fontWeight: 800, color: t.coral }}>{qty}</span><span style={{ fontSize: 13, color: t.muted, marginLeft: 3 }}>{tr("g")}</span></span>
              </div>
              <input type="range" min={1} max={200} step={1} value={qty}
                onChange={(e) => setQty(clampGrams(Number(e.target.value)))}
                style={{ width: "100%", accentColor: t.coral }} />
              <div style={{ display: "flex", gap: 7, marginTop: 12, flexWrap: "wrap" }}>
                {[25, 50, 100, 150, 200].map((g) => {
                  const active = qty === g;
                  return (
                    <button key={g} onClick={() => setQty(g)}
                      style={{ flex: 1, minWidth: 54, border: `1px solid ${active ? t.coral : t.line}`, background: active ? t.coralLight : "#fff",
                        color: active ? t.coralDark : t.ink, fontFamily: FONT, fontWeight: 700, fontSize: 13, padding: "9px 4px", borderRadius: 9, cursor: "pointer" }}>
                      {g} {tr("g")}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          <div style={{ fontSize: 12.5, color: t.muted, margin: "14px 0" }}>
            = {fmt(picked.cal * f, 0)} {tr("kcal")} · {tr("pS")} {fmt(picked.protein * f)} · {tr("cS")} {fmt(picked.carbs * f)} · {tr("fS")} {fmt(picked.fat * f)}
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Button variant="ghost" onClick={() => setPicked(null)}>{tr("back")}</Button>
            <Button variant="primary" style={{ flex: 1 }} onClick={() => onAdd(picked.id, qty || defaultAmount(picked))}><Check size={17} /> {tr("add")}</Button>
          </div>
        </div>
      )}
    </Modal>
  );
}

const stepBtn = { width: 38, height: 38, borderRadius: 10, border: `1px solid ${t.line}`, background: t.tealPale, color: t.tealDark, display: "grid", placeItems: "center", cursor: "pointer" };

function AIModal({ meal, lang, onClose, onAdd }) {
  const tr = (k) => STR[lang][k] ?? k;
  const lab = (o) => (lang === "en" ? o.labelEn : o.label);
  const [text, setText] = useState("");
  const [image, setImage] = useState(null); // { dataUrl, base64 }
  const [loading, setLoading] = useState(false);
  const [items, setItems] = useState(null);
  const [error, setError] = useState("");
  const fileRef = useRef(null);

  // смаляване до макс ~1024px и конвертиране към JPEG (нормализира и HEIC)
  const onPickImage = (ev) => {
    const file = ev.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new window.Image();
      img.onload = () => {
        const max = 1024;
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.82);
        setImage({ dataUrl, base64: dataUrl.split(",")[1] });
        setItems(null); setError("");
      };
      img.onerror = () => setError(tr("aiError"));
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
    ev.target.value = "";
  };

  const analyze = async () => {
    if (!text.trim() && !image) return;
    setLoading(true); setError(""); setItems(null);
    const langName = lang === "en" ? "English" : "Bulgarian";
    const instr =
      `You are a nutrition estimation engine. ` +
      (image ? `Identify the foods visible in the photo and estimate the nutrition for the portions shown. ` : "") +
      (text.trim() ? `Use this description${image ? " as extra context" : ""}: """${text.trim()}""". ` : "") +
      `Break the meal into individual food items. Respond with ONLY a JSON object, no markdown, no commentary, in this exact shape: ` +
      `{"items":[{"name":"<short food name in ${langName}>","grams":<number, estimated grams or ml eaten>,` +
      `"cal":<number>,"protein":<number>,"carbs":<number>,"fat":<number>,` +
      `"micros":{"fiber":<g>,"sugar":<g>,"satfat":<g>,"sodium":<mg>,"potassium":<mg>,"calcium":<mg>,"magnesium":<mg>,"iron":<mg>,"zinc":<mg>,"vitA":<µg>,"vitC":<mg>,"vitD":<µg>,"vitE":<mg>,"vitK":<µg>,"vitB12":<µg>}}]}. ` +
      `All nutrition numbers (macros AND micros) are TOTALS for the eaten portion (not per 100 g). Macros rounded to integers. ` +
      `Use realistic average values. If there is no food, return {"items":[]}.`;
    const content = [];
    if (image) content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: image.base64 } });
    content.push({ type: "text", text: instr });
    try {
      const res = await fetch(AI_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content }] }),
      });
      const data = await res.json();
      const raw = (data.content || []).map((b) => b.text || "").join("").trim();
      let clean = raw.replace(/```json/gi, "").replace(/```/g, "").trim();
      const a = clean.indexOf("{"), z = clean.lastIndexOf("}");
      if (a >= 0 && z > a) clean = clean.slice(a, z + 1);
      const parsed = JSON.parse(clean);
      const list = (parsed.items || parsed || []).map((x) => {
        const micros = {}; MICRO_KEYS.forEach((k) => (micros[k] = Math.round((Number(x.micros?.[k]) || 0) * 10) / 10));
        return {
          name: String(x.name || "?"),
          grams: Math.round(Number(x.grams) || 0),
          cal: Math.round(Number(x.cal) || 0),
          protein: Math.round(Number(x.protein) || 0),
          carbs: Math.round(Number(x.carbs) || 0),
          fat: Math.round(Number(x.fat) || 0),
          micros, _on: true,
        };
      });
      setItems(list);
    } catch (e) {
      setError(tr("aiError"));
    } finally {
      setLoading(false);
    }
  };

  const toggle = (i) => setItems((arr) => arr.map((x, j) => (j === i ? { ...x, _on: !x._on } : x)));
  const chosen = items ? items.filter((x) => x._on) : [];
  const totals = chosen.reduce((a, b) => ({ cal: a.cal + b.cal, protein: a.protein + b.protein, carbs: a.carbs + b.carbs, fat: a.fat + b.fat }), { cal: 0, protein: 0, carbs: 0, fat: 0 });

  const add = () => {
    if (!chosen.length) return;
    onAdd(chosen.map((x) => ({ name: x.grams ? `${x.name} (~${x.grams} ${tr("g")})` : x.name, cal: x.cal, protein: x.protein, carbs: x.carbs, fat: x.fat, micros: x.micros })));
  };

  const canAnalyze = (text.trim() || image) && !loading;

  return (
    <Modal title={`${lab(meal)} · ${tr("aiTitle")}`} onClose={onClose}>
      <div style={{ display: "flex", gap: 7, alignItems: "center", background: t.coralLight, color: t.coralDark, padding: "9px 12px", borderRadius: 10, fontSize: 12.5, marginBottom: 12 }}>
        <Sparkles size={16} /> <span>{tr("aiDesc")}</span>
      </div>

      {/* снимка */}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onPickImage} style={{ display: "none" }} />
      {image ? (
        <div style={{ position: "relative", marginBottom: 10 }}>
          <img src={image.dataUrl} alt="" style={{ width: "100%", maxHeight: 220, objectFit: "cover", borderRadius: 12, border: `1px solid ${t.line}` }} />
          <button onClick={() => setImage(null)} title={tr("aiRemovePhoto")}
            style={{ position: "absolute", top: 8, right: 8, border: "none", background: "rgba(20,50,55,0.7)", color: "#fff", width: 32, height: 32, borderRadius: 8, cursor: "pointer", display: "grid", placeItems: "center" }}>
            <X size={16} />
          </button>
        </div>
      ) : (
        <button onClick={() => fileRef.current?.click()}
          style={{ width: "100%", border: `1.5px dashed ${t.teal}`, background: t.tealPale, color: t.tealDark, fontFamily: FONT, fontWeight: 700, fontSize: 14, padding: "14px", borderRadius: 12, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 10 }}>
          <Camera size={18} /> {tr("aiPhoto")}
        </button>
      )}

      <div style={{ textAlign: "center", fontSize: 11.5, color: t.muted, margin: "2px 0 8px" }}>— {tr("aiOr")} —</div>

      <textarea value={text} onChange={(e) => setText(e.target.value)} placeholder={tr("aiPlaceholder")} rows={3}
        style={{ width: "100%", fontFamily: FONT, fontSize: 14, color: t.ink, border: `1px solid ${t.line}`, borderRadius: 11, padding: "11px 12px", background: t.bgSoft, outline: "none", resize: "vertical" }} />

      <Button variant="primary" onClick={analyze} style={{ width: "100%", marginTop: 10, opacity: canAnalyze ? 1 : 0.6 }}>
        {loading ? <><Loader2 size={17} className="spin" /> {tr("aiAnalyzing")}</> : <><Sparkles size={17} /> {tr("aiAnalyze")}</>}
      </Button>

      {error && <div style={{ marginTop: 12, color: t.warn, fontSize: 13, display: "flex", gap: 6, alignItems: "center" }}><AlertTriangle size={15} /> {error}</div>}

      {items && items.length === 0 && <div style={{ marginTop: 14, color: t.muted, fontSize: 13, textAlign: "center" }}>{tr("aiNoItems")}</div>}

      {items && items.length > 0 && (
        <div style={{ marginTop: 14 }}>
          {items.map((it, i) => (
            <div key={i} onClick={() => toggle(i)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 4px", borderBottom: `1px solid ${t.line}`, cursor: "pointer", opacity: it._on ? 1 : 0.45 }}>
              <input type="checkbox" checked={it._on} readOnly style={{ width: 18, height: 18, accentColor: t.coral }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600, color: t.ink }}>{it.name} {it.grams ? <span style={{ color: t.muted, fontWeight: 400 }}>~{it.grams} {tr("g")}</span> : null}</div>
                <div style={{ fontSize: 11.5, color: t.muted }}>{tr("pS")} {it.protein} · {tr("cS")} {it.carbs} · {tr("fS")} {it.fat}</div>
              </div>
              <div style={{ fontWeight: 700, color: t.ink, fontSize: 13.5 }}>{it.cal} {tr("kcal")}</div>
            </div>
          ))}
          <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 4px", fontWeight: 700, color: t.tealDark }}>
            <span>Σ {chosen.length}</span>
            <span>{totals.cal} {tr("kcal")} · {tr("pS")} {totals.protein} · {tr("cS")} {totals.carbs} · {tr("fS")} {totals.fat}</span>
          </div>
          <Button variant="primary" onClick={add} style={{ width: "100%", opacity: chosen.length ? 1 : 0.5 }}><Check size={17} /> {tr("aiAddAll")}</Button>
          <div style={{ fontSize: 11, color: t.muted, textAlign: "center", marginTop: 8 }}>{tr("aiEst")} · AI</div>
        </div>
      )}
    </Modal>
  );
}

            </tr>
            <tr style={{ background: t.tealPale }}>

              {[["cal", "calories"], ["protein", "protein"], ["carbs", "carbs"], ["fat", "fat"]].map(([a, p]) => {

                return <td key={a} style={{ ...tdS, color: diff > 0 ? t.warn : t.good, fontWeight: 700 }}>{diff >= 0 ? "+" : ""}{fmt(diff, 0)}</td>;

              <td style={{ ...tdS, fontWeight: 800 }}>{fmt(avg.carbs)}</td><td style={{ ...tdS, fontWeight: 800 }}>{fmt(avg.fat)}</td>

/* ============================================================
   ЕКРАН 5 — СПИСЪК ЗА ПАЗАР
   ============================================================ */
function ShoppingScreen() {
  const { state, actions } = useStore();
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  const [newItem, setNewItem] = useState("");

  const start = new Date(state.weekStart);
  const used = useMemo(() => {
    const map = new Map();
    for (let i = 0; i < 7; i++) {
      const day = state.diary[iso(addDays(start, i))];
      if (!day) continue;
      MEALS.forEach((m) => day[m.id].forEach((e) => {
        const p = state.products.find((x) => x.id === e.productId);
        if (p) map.set(p.name, productName(p, L));
      }));
    }
    return [...map.entries()].map(([key, label]) => ({ key, label })).sort((a, b) => a.label.localeCompare(b.label, L));
  }, [state.diary, state.products, state.weekStart, L]);

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <SectionBar color={t.tealDark}>{tr("shoppingList")}</SectionBar>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <SectionBar>{tr("manualList")}</SectionBar>
        <div style={{ display: "flex", gap: 8, padding: 12 }}>
          <input value={newItem} onChange={(e) => setNewItem(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter" && newItem.trim()) { actions.addManual(newItem.trim()); setNewItem(""); } }}
            placeholder={tr("addShoppingItem")}
            style={{ flex: 1, ...inputStyle, width: "auto", textAlign: "left" }} />
          <Button onClick={() => { if (newItem.trim()) { actions.addManual(newItem.trim()); setNewItem(""); } }}><Plus size={18} /></Button>
        </div>
        {state.shopping.manual.length === 0 && <div style={{ padding: "0 12px 14px", color: t.muted, fontSize: 13 }}>{tr("noManual")}</div>}
        {state.shopping.manual.map((m) => (
          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderTop: `1px solid ${t.line}` }}>
            <input type="checkbox" checked={m.checked} onChange={() => actions.toggleManual(m.id)} style={{ width: 19, height: 19, accentColor: t.coral }} />
            <span style={{ flex: 1, fontSize: 14, color: m.checked ? t.muted : t.ink, textDecoration: m.checked ? "line-through" : "none" }}>{m.text}</span>
            <button onClick={() => actions.deleteManual(m.id)} style={{ border: "none", background: "none", cursor: "pointer", color: t.muted }}><Trash2 size={16} /></button>
          </div>
        ))}
      </Card>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <SectionBar>{tr("autoFromWeek")}</SectionBar>
        {used.length === 0 && <div style={{ padding: 16, color: t.muted, fontSize: 13, textAlign: "center" }}>{tr("noWeekProducts")}</div>}
        {used.map((u, i) => {
          const checked = !!state.shopping.autoChecked[u.key];
          return (
            <div key={u.key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderTop: i === 0 ? "none" : `1px solid ${t.line}`, background: i % 2 ? t.bgSoft : "#fff" }}>
              <input type="checkbox" checked={checked} onChange={() => actions.toggleAuto(u.key)} style={{ width: 19, height: 19, accentColor: t.coral }} />
              <span style={{ flex: 1, fontSize: 14, color: checked ? t.muted : t.ink, textDecoration: checked ? "line-through" : "none" }}>{u.label}</span>
            </div>
          );
        })}
      </Card>
      <div style={{ fontSize: 12, color: t.muted, textAlign: "center" }}>{tr("shoppingNote")}</div>
    </div>
  );
}

/* ============================================================
   ЕКРАН 6 — НАСТРОЙКИ (Export / Import / Reset)
   ============================================================ */
function SettingsScreen() {
  const { state, actions } = useStore();
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  const fileJson = useRef(null);
  const fileCsv = useRef(null);
  const [msg, setMsg] = useState("");
  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(""), 2500); };

  const download = (filename, text, type) => {
    const blob = new Blob([text], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const exportJson = () => { download("kalorii-tracker.json", JSON.stringify(state, null, 2), "application/json"); flash(tr("tExportedJson")); };
  const exportCsv = () => {
    const header = "name,nameEn,unit,cal,protein,carbs,fat";
    const rows = state.products.map((p) => `"${p.name}","${p.nameEn || ""}",${p.unit === "piece" ? "1 бр" : "100 g"},${p.cal},${p.protein},${p.carbs},${p.fat}`);
    download("produkti.csv", "\uFEFF" + [header, ...rows].join("\n"), "text/csv");
    flash(tr("tExportedCsv"));
  };

  const importJson = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => { try { actions.importState(JSON.parse(r.result)); flash(tr("tImported")); } catch { flash(tr("tBadJson")); } };
    r.readAsText(file); e.target.value = "";
  };
  const importCsv = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const lines = String(r.result).replace(/^\uFEFF/, "").trim().split(/\r?\n/).slice(1);
        const list = lines.map((line) => {
          const m = line.match(/^"?(.*?)"?,"?(.*?)"?,(.*?),(.*?),(.*?),(.*?),(.*?)$/);
          if (!m) return null;
          const [, name, nameEn, unit, cal, protein, carbs, fat] = m;
          return { id: uid(), name: name.trim(), nameEn: nameEn.trim() || undefined, unit: /бр|pc/.test(unit) ? "piece" : "100g", cal: +cal || 0, protein: +protein || 0, carbs: +carbs || 0, fat: +fat || 0 };
        }).filter(Boolean);
        actions.importProducts(list); flash(tr("tImportedN").replace("{n}", list.length));
      } catch { flash(tr("tBadCsv")); }
    };
    r.readAsText(file); e.target.value = "";
  };

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <SectionBar color={t.tealDark}>{tr("title_settings")}</SectionBar>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 700, color: t.ink }}>{tr("language")}</span>
          <Segmented value={L} onChange={(v) => actions.setLang(v)}
            options={[{ value: "bg", label: STR.bg.bulgarian }, { value: "en", label: STR.en.english }]} />
        </div>
      </Card>

      <Card>
        <div style={{ fontWeight: 700, color: t.ink, marginBottom: 12 }}>{tr("exportData")}</div>
        <div style={{ display: "grid", gap: 10 }}>
          <Button variant="teal" onClick={exportJson}><Download size={17} /> {tr("exportAll")}</Button>
          <Button variant="ghost" onClick={exportCsv}><Download size={17} /> {tr("exportProducts")}</Button>
        </div>
      </Card>

      <Card>
        <div style={{ fontWeight: 700, color: t.ink, marginBottom: 12 }}>{tr("importData")}</div>
        <div style={{ display: "grid", gap: 10 }}>
          <Button variant="ghost" onClick={() => fileJson.current?.click()}><Upload size={17} /> {tr("importAll")}</Button>
          <Button variant="ghost" onClick={() => fileCsv.current?.click()}><Upload size={17} /> {tr("importProducts")}</Button>
          <input ref={fileJson} type="file" accept=".json,application/json" onChange={importJson} style={{ display: "none" }} />
          <input ref={fileCsv} type="file" accept=".csv,text/csv" onChange={importCsv} style={{ display: "none" }} />
        </div>
        <div style={{ fontSize: 12, color: t.muted, marginTop: 10 }}>{tr("csvNote")}</div>
      </Card>

      <Card>
        <div style={{ fontWeight: 700, color: t.ink, marginBottom: 12 }}>{tr("reset")}</div>
        <Button variant="danger" onClick={() => { if (confirm(tr("resetConfirm"))) { actions.reset(); flash(tr("tResetDone")); } }}>
          <RotateCcw size={17} /> {tr("resetAll")}
        </Button>
      </Card>

      <div style={{ fontSize: 12, color: t.muted, textAlign: "center", lineHeight: 1.6 }}>
        {tr("footer1")}<br />{tr("footer2")}
      </div>

      {msg && <div style={{ position: "fixed", bottom: 86, left: "50%", transform: "translateX(-50%)", background: t.tealDark, color: "#fff", padding: "10px 18px", borderRadius: 30, fontSize: 13, fontWeight: 600, zIndex: 60, boxShadow: "0 4px 16px rgba(0,0,0,0.2)" }}>{msg}</div>}
    </div>
  );
}

function WeightScreen() {
  const { state, actions } = useStore();
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  const weights = state.weights || {};
  const [date, setDate] = useState(iso(new Date()));
  const [val, setVal] = useState("");

  // синхронизира полето със записа за избрания ден
  useEffect(() => { setVal(weights[date] != null ? String(weights[date]) : ""); }, [date, weights]);

  const entries = useMemo(
    () => Object.entries(weights).map(([d, kg]) => ({ d, kg })).sort((a, b) => (a.d < b.d ? -1 : 1)),
    [weights]
  );

  const within = (days) => {
    const cut = iso(addDays(new Date(), -(days - 1)));
    const vals = entries.filter((e) => e.d >= cut).map((e) => e.kg);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  };
  const avgW = within(7), avgM = within(30), avgY = within(365);
  const latest = entries.length ? entries[entries.length - 1] : null;
  const last7 = entries.filter((e) => e.d >= iso(addDays(new Date(), -6)));
  const weekChange = last7.length >= 2 ? last7[last7.length - 1].kg - last7[0].kg : null;

  const shortD = (d) => { const x = new Date(d); return L === "en" ? `${x.getMonth() + 1}/${x.getDate()}` : `${x.getDate()}.${x.getMonth() + 1}`; };
  const chartData = entries.slice(-90).map((e) => ({ name: shortD(e.d), kg: e.kg }));

  const save = () => { const n = Number(String(val).replace(",", ".")); if (n > 0) actions.setWeight(date, Math.round(n * 10) / 10); };

  const avgTile = (label, period, v) => (
    <div style={{ flex: 1, background: t.tealPale, borderRadius: 12, padding: "12px 8px", textAlign: "center" }}>
      <div style={{ fontSize: 11, color: t.muted, fontWeight: 700 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 800, color: t.tealDark, lineHeight: 1.1 }}>{v != null ? fmt(v) : "—"}</div>
      <div style={{ fontSize: 10, color: t.muted }}>{period} · {tr("kg")}</div>
    </div>
  );

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <SectionBar color={t.tealDark}>{tr("title_weight")}</SectionBar>

      {/* запис за деня */}
      <Card>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <button onClick={() => setDate(iso(addDays(date, -1)))} style={{ ...navBtn, background: t.tealPale, color: t.tealDark }}><ChevronLeft size={20} /></button>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontWeight: 700, fontSize: 14, color: t.ink }}>{longDate(date, L)}</div>
            <button onClick={() => setDate(iso(new Date()))} style={{ background: "none", border: "none", color: t.coral, fontSize: 11, cursor: "pointer" }}>{tr("today")}</button>
          </div>
          <button onClick={() => setDate(iso(addDays(date, 1)))} style={{ ...navBtn, background: t.tealPale, color: t.tealDark }}><ChevronRight size={20} /></button>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <span style={{ flex: 1, fontWeight: 600, color: t.ink }}>{tr("logWeight")}</span>
          <input value={val} onChange={(e) => setVal(e.target.value)} type="number" inputMode="decimal" step="0.1" placeholder="—"
            style={{ ...inputStyle, width: 90, textAlign: "center" }} />
          <span style={{ color: t.muted, fontSize: 13 }}>{tr("kg")}</span>
          <Button variant="primary" onClick={save}><Check size={16} /></Button>
        </div>
      </Card>

      {/* текущо + промяна */}
      <Card>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 12, color: t.muted, fontWeight: 700 }}>{tr("currentWeight")}</div>
            <div style={{ fontSize: 32, fontWeight: 800, color: t.tealDark, lineHeight: 1.1 }}>{latest ? fmt(latest.kg) : "—"} <span style={{ fontSize: 15, color: t.muted, fontWeight: 600 }}>{tr("kg")}</span></div>
          </div>
          {weekChange != null && (
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 12, color: t.muted, fontWeight: 700 }}>{tr("change")} · {tr("last7")}</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: weekChange > 0 ? t.warn : t.good }}>{weekChange >= 0 ? "+" : ""}{fmt(weekChange)} {tr("kg")}</div>
            </div>
          )}
        </div>
      </Card>

      {/* средни */}
      <div style={{ display: "flex", gap: 10 }}>
        {avgTile(tr("avgWeek"), tr("last7"), avgW)}
        {avgTile(tr("avgMonth"), tr("last30"), avgM)}
        {avgTile(tr("avgYear"), tr("last365"), avgY)}
      </div>

      {/* графика */}
      <Card>
        <div style={{ fontWeight: 700, color: t.ink, marginBottom: 6, fontSize: 14 }}>{tr("weightChart")}</div>
        {chartData.length >= 2 ? (
          <div style={{ height: 220 }}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={chartData} margin={{ top: 8, right: 10, left: -14, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={t.line} vertical={false} />
                <XAxis dataKey="name" tick={{ fontSize: 10, fill: t.muted }} axisLine={false} tickLine={false} minTickGap={20} />
                <YAxis domain={["dataMin - 1", "dataMax + 1"]} tick={{ fontSize: 11, fill: t.muted }} axisLine={false} tickLine={false} width={34} />
                <Tooltip contentStyle={tooltipStyle} formatter={(v) => [`${fmt(v)} ${tr("kg")}`, tr("t_weight")]} />
                <Line type="monotone" dataKey="kg" stroke={t.coral} strokeWidth={2.5} dot={{ r: 2.5, fill: t.coral }} activeDot={{ r: 5 }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        ) : <EmptyHint text={tr("noWeight")} />}
      </Card>

      {/* история */}
      <Card style={{ padding: 0, overflow: "hidden" }}>
        <SectionBar>{tr("weightHistory")}</SectionBar>
        {entries.length === 0 && <div style={{ padding: 16, color: t.muted, fontSize: 13, textAlign: "center" }}>{tr("noWeight")}</div>}
        {entries.slice().reverse().map((e, i) => (
          <div key={e.d} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 14px", borderTop: i === 0 ? "none" : `1px solid ${t.line}`, background: i % 2 ? t.bgSoft : "#fff" }}>
            <span style={{ fontSize: 13.5, color: t.ink }}>{longDate(e.d, L)}</span>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontWeight: 700, color: t.tealDark }}>{fmt(e.kg)} {tr("kg")}</span>
              <button onClick={() => { actions.deleteWeight(e.d); }} style={{ border: "none", background: "none", cursor: "pointer", color: t.muted, padding: 2 }}><Trash2 size={15} /></button>
            </span>
          </div>
        ))}
      </Card>
    </div>
  );
}

  const [name, setName] = useState(recipe.name || "");

  const valid = name.trim() && ings.length > 0;

  const found = q.trim() ? products.filter((p) => (p.name + " " + (p.nameEn || "")).toLowerCase().includes(q.trim().toLowerCase())).slice(0, 6) : [];
  const draft = { ingredients: ings, servings };

    <Modal title={recipe.id ? tr("editRecipe") : tr("newRecipe")} onClose={onClose}>

      <div style={{ fontWeight: 700, color: t.ink, margin: "14px 0 8px" }}>{tr("ingredients")}</div>

            <span style={{ fontSize: 11, color: t.muted, width: 14 }}>{isPiece ? tr("pc") : tr("g")}</span>
            <button onClick={() => setIngs((arr) => arr.filter((_, j) => j !== i))} style={{ border: "none", background: "none", cursor: "pointer", color: t.muted }}><X size={16} /></button>
          </div>
        );
      })}
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder={tr("addIngredient") + "..."} style={{ ...inputStyle, width: "100%", textAlign: "left", marginTop: 8 }} />

        <button key={p.id} onClick={() => { setIngs((arr) => [...arr, { productId: p.id, qty: defaultAmount(p) }]); setQ(""); }}
          style={{ width: "100%", textAlign: "left", border: "none", borderBottom: `1px solid ${t.line}`, background: t.bgSoft, padding: "10px", cursor: "pointer", fontFamily: FONT, fontSize: 13.5, color: t.ink, display: "flex", justifyContent: "space-between" }}>
          <span>{productName(p, L)}</span><span style={{ color: t.muted, fontSize: 12 }}>{p.cal} {tr("kcal")}</span>

      <div style={{ background: t.tealPale, borderRadius: 12, padding: 12, marginTop: 14, fontSize: 12.5, color: t.ink }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700 }}><span>{tr("perServing")}</span><span>{fmt(rt.per.cal, 0)} {tr("kcal")}</span></div>
        <div style={{ color: t.muted, marginTop: 2 }}>{tr("pS")} {fmt(rt.per.protein)} · {tr("cS")} {fmt(rt.per.carbs)} · {tr("fS")} {fmt(rt.per.fat)} · {MICROS[0][L]}: {fmt(rt.perMicro.fiber)} {tr("g")}</div>
      </div>

      <Button variant="primary" style={{ width: "100%", marginTop: 16, opacity: valid ? 1 : 0.5 }}

        <Check size={17} /> {tr("save")}
      </Button>
    </Modal>
  );
}

   ЕКРАН — МИКРОНУТРИЕНТИ
   ============================================================ */
function MicrosScreen() {
  const { state, actions } = useStore();
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  const sd = state.selectedDate;
  const day = state.diary[sd] || emptyDay();
  const todays = MEALS.flatMap((m) => day[m.id]);
  const micros = dayMicros(todays, state.products);
  const [sel, setSel] = useState("fiber");

  const warnings = [];
  MICROS.forEach((m) => {
    const pct = m.rda ? (micros[m.key] / m.rda) * 100 : 0;
    if (m.type === "limit" && pct > 100) warnings.push({ m, kind: "excess" });
    if (m.type === "goal" && pct < 25) warnings.push({ m, kind: "low" });
  });

  const shortD = (d) => { const x = new Date(d); return L === "en" ? `${x.getMonth() + 1}/${x.getDate()}` : `${x.getDate()}.${x.getMonth() + 1}`; };
  const hist = [...Array(14)].map((_, i) => {
    const d = iso(addDays(new Date(), -(13 - i)));
    const dd = state.diary[d] || emptyDay();
    const mic = dayMicros(MEALS.flatMap((m) => dd[m.id]), state.products);
    return { name: shortD(d), v: round(mic[sel], 1) };
  });
  const selMicro = MICROS.find((m) => m.key === sel);

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <SectionBar color={t.tealDark}>{tr("micronutrients")}</SectionBar>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: t.tealDark, borderRadius: 12, padding: "8px 10px", color: "#fff" }}>
        <button onClick={() => actions.setSelectedDate(iso(addDays(sd, -1)))} style={navBtn}><ChevronLeft size={20} /></button>
        <div style={{ fontWeight: 700, fontSize: 14 }}>{longDate(sd, L)}</div>
        <button onClick={() => actions.setSelectedDate(iso(addDays(sd, 1)))} style={navBtn}><ChevronRight size={20} /></button>
      </div>

      {warnings.length > 0 && (
        <Card style={{ padding: 12, background: t.coralLight, border: "none" }}>
          {warnings.map((w, i) => (
            <div key={i} style={{ display: "flex", gap: 7, alignItems: "center", fontSize: 12.5, color: t.coralDark, padding: "2px 0" }}>
              <AlertTriangle size={14} /> {w.m[L]}: {w.kind === "excess" ? tr("warnExcess") : tr("warnLow")}
            </div>
          ))}
        </Card>
      )}

      <Card style={{ padding: 14 }}>
        <div style={{ fontWeight: 700, color: t.ink, marginBottom: 4 }}>{tr("dailyIntake")}</div>
        {MICROS.map((m) => {
          const v = micros[m.key]; const pct = m.rda ? (v / m.rda) * 100 : 0;
          const over = m.type === "limit" && pct > 100;
          const reached = m.type === "goal" && pct >= 100;
          const col = over ? t.warn : reached ? t.good : t.teal;
          return (
            <div key={m.key} style={{ padding: "8px 0", borderBottom: `1px solid ${t.line}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginBottom: 4 }}>
                <span style={{ color: t.ink, fontWeight: 600 }}>{m[L]}</span>
                <span style={{ color: t.muted }}>{fmt(v)} / {m.rda} {m.unit} · <b style={{ color: col }}>{fmt(pct, 0)}%</b> {tr("ofRDA")}</span>
              </div>
              <div style={{ height: 7, background: t.tealPale, borderRadius: 5, overflow: "hidden" }}>
                <div style={{ width: `${Math.min(100, pct)}%`, height: "100%", background: col }} />
              </div>
            </div>
          );
        })}
      </Card>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontWeight: 700, color: t.ink, fontSize: 14 }}>{tr("nutrientHistory")}</span>
          <Select value={sel} onChange={setSel} options={MICROS.map((m) => ({ value: m.key, label: m[L] }))} />
        </div>
        <div style={{ height: 200 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={hist} margin={{ top: 8, right: 10, left: -16, bottom: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={t.line} vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 10, fill: t.muted }} axisLine={false} tickLine={false} minTickGap={16} />
              <YAxis tick={{ fontSize: 11, fill: t.muted }} axisLine={false} tickLine={false} width={34} />
              <Tooltip contentStyle={tooltipStyle} formatter={(v) => [`${fmt(v)} ${selMicro.unit}`, selMicro[L]]} />
              <Line type="monotone" dataKey="v" stroke={t.coral} strokeWidth={2.5} dot={{ r: 2, fill: t.coral }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </Card>
      <div style={{ fontSize: 12, color: t.muted, textAlign: "center" }}>{tr("microsNote")}</div>
    </div>
  );
}

/* ============================================================
   ЕКРАН — AI АСИСТЕНТ (чат)
   ============================================================ */
function AIChatScreen() {
  const { state, actions } = useStore();
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const chat = state.chat || [];
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chat.length, busy]);

  const buildSystem = () => {
    const plan = computePlan(state.profile, state.macros);
    const day = state.diary[state.selectedDate] || emptyDay();
    const todays = MEALS.flatMap((m) => day[m.id]);
    const consumed = sumTotals(todays.map((e) => entryTotals(e, state.products)));
    const mic = dayMicros(todays, state.products);
    const rem = { cal: plan.calories - consumed.cal, protein: plan.protein - consumed.protein, carbs: plan.carbs - consumed.carbs, fat: plan.fat - consumed.fat };
    const inv = state.products.map((p) => productName(p, L)).join(", ");
    const recipeList = (state.recipes || []).map((r) => {
      const rt = recipeTotals(r, state.products);
      return `${L === "en" && r.nameEn ? r.nameEn : r.name} (${fmt(rt.per.cal, 0)} kcal/${tr("perServing")})`;
    }).join("; ") || "—";
    const today = iso(new Date());
    const expiring = state.products.filter((p) => p.expiry && (new Date(p.expiry) - new Date(today)) / 86400000 <= 5)
      .map((p) => `${productName(p, L)} (${p.expiry})`).join(", ") || "—";
    const microGaps = MICROS.map((m) => `${m[L]} ${fmt(mic[m.key])}/${m.rda}${m.unit}`).join(", ");
    const langName = L === "en" ? "English" : "Bulgarian";
    return [
      `You are a friendly, practical nutrition assistant inside a calorie-tracking app. Always answer in ${langName}.`,
      `Be concise and actionable. When you propose a meal or recipe, give approximate calories and macros.`,
      `You can: suggest meals from available products, generate recipes, propose substitutes for missing ingredients, optimize meals for the remaining macros/micros of the day, build daily/weekly meal plans, answer nutrition questions, and suggest ways to reduce food waste using items expiring soon.`,
      ``,
      `USER PROFILE: ${state.profile.name ? "name " + state.profile.name + ", " : ""}${state.profile.sex}, ${state.profile.weight}kg, ${state.profile.height}cm, ${state.profile.age}y, activity ${state.profile.activity}, goal ${state.profile.goal}${state.profile.goalWeight ? ", target weight " + state.profile.goalWeight + "kg" : ""}.`,
      `DAILY TARGETS: ${plan.calories} kcal, protein ${fmt(plan.protein)}g, carbs ${fmt(plan.carbs)}g, fat ${fmt(plan.fat)}g.`,
      `CONSUMED TODAY: ${fmt(consumed.cal, 0)} kcal, P ${fmt(consumed.protein)} / C ${fmt(consumed.carbs)} / F ${fmt(consumed.fat)}.`,
      `REMAINING TODAY: ${fmt(rem.cal, 0)} kcal, P ${fmt(rem.protein)} / C ${fmt(rem.carbs)} / F ${fmt(rem.fat)}.`,
      `MICRONUTRIENTS TODAY vs RDA: ${microGaps}.`,
      `PREFERENCES — allergies: ${state.prefs?.allergies || "none"}; diet: ${state.prefs?.diet || "none"}; notes: ${state.prefs?.note || "none"}. NEVER suggest foods that conflict with the allergies.`,
      `AVAILABLE PRODUCTS (inventory): ${inv}.`,
      `SAVED RECIPES: ${recipeList}.`,
      `PRODUCTS EXPIRING SOON: ${expiring}.`,
    ].join("\n");
  };

  const send = async (txt) => {
    const content = (txt ?? input).trim();
    if (!content || busy) return;
    setInput("");
    const userMsg = { role: "user", content };
    actions.pushChat(userMsg);
    setBusy(true);
    try {
      const sys = buildSystem();
      const convo = [...chat, userMsg].map((m) => ({ role: m.role, content: m.content }));
      const apiMessages = convo.map((m, i) => (i === 0 ? { role: "user", content: sys + "\n\n---\n\n" + m.content } : m));
      const res = await fetch(AI_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: apiMessages }),
      });
      const data = await res.json().catch(() => null);
      if (!res.ok || !data || data.error) {
        const detail = (data && data.error && (data.error.message || data.error.type)) || ("HTTP " + res.status);
        throw new Error(detail);
      }
      const reply = (data.content || []).map((b) => b.text || "").join("").trim();
      actions.pushChat({ role: "assistant", content: reply || tr("aiError") });
    } catch (e) {
      actions.pushChat({ role: "assistant", content: tr("aiError") + "\n\n⚠️ " + (e && e.message ? e.message : String(e)) });
    } finally {
      setBusy(false);
    }
  };

  const quicks = [["q_meal"], ["q_recipe"], ["q_plan"], ["q_waste"]];

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "calc(100vh - 230px)" }}>
      <div style={{ display: "flex", gap: 7, alignItems: "flex-start", background: t.coralLight, color: t.coralDark, padding: "9px 12px", borderRadius: 10, fontSize: 12.5, marginBottom: 12 }}>
        <Sparkles size={16} style={{ flexShrink: 0, marginTop: 1 }} /> <span>{tr("aiChatHint")}</span>
      </div>

      {chat.length === 0 && (
        <div style={{ display: "grid", gap: 8, marginBottom: 12 }}>
          {quicks.map(([k]) => (
            <button key={k} onClick={() => send(tr(k))} style={{ textAlign: "left", border: `1px solid ${t.line}`, background: "#fff", borderRadius: 12, padding: "12px 14px", cursor: "pointer", fontFamily: FONT, fontSize: 14, color: t.ink, display: "flex", alignItems: "center", gap: 8 }}>
              <Sparkles size={15} color={t.coral} /> {tr(k)}
            </button>
          ))}
        </div>
      )}

      <div style={{ flex: 1, display: "grid", gap: 10, alignContent: "start" }}>
        {chat.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
            <div style={{ maxWidth: "85%", whiteSpace: "pre-wrap", fontSize: 14, lineHeight: 1.5, padding: "10px 13px", borderRadius: 14,
              background: m.role === "user" ? t.teal : "#fff", color: m.role === "user" ? "#fff" : t.ink,
              border: m.role === "user" ? "none" : `1px solid ${t.line}`, borderBottomRightRadius: m.role === "user" ? 4 : 14, borderBottomLeftRadius: m.role === "user" ? 14 : 4 }}>
              {m.content}
            </div>
          </div>
        ))}
        {busy && <div style={{ display: "flex", gap: 6, alignItems: "center", color: t.muted, fontSize: 13 }}><Loader2 size={15} className="spin" /> {tr("thinking")}</div>}
        <div ref={endRef} />
      </div>

      <div style={{ position: "sticky", bottom: 0, paddingTop: 10, background: t.bgSoft }}>
        {chat.length > 0 && <button onClick={actions.clearChat} style={{ border: "none", background: "none", color: t.muted, fontSize: 12, cursor: "pointer", marginBottom: 6 }}>{tr("clearChat")}</button>}
        <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
          <textarea value={input} onChange={(e) => setInput(e.target.value)} rows={1} placeholder={tr("askPlaceholder")}
            onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
            style={{ flex: 1, fontFamily: FONT, fontSize: 14, color: t.ink, border: `1px solid ${t.line}`, borderRadius: 12, padding: "11px 12px", background: "#fff", outline: "none", resize: "none", maxHeight: 120 }} />
          <Button variant="primary" onClick={() => send()} style={{ opacity: input.trim() && !busy ? 1 : 0.6, padding: "11px 14px" }}><Send size={18} /></Button>
        </div>
      </div>
    </div>
  );
}

  { id: "recipes", key: "t_recipes", Icon: ChefHat },
  { id: "week", key: "t_week", Icon: CalendarDays },
  { id: "ai", key: "t_ai", Icon: MessageCircle },
  { id: "more", key: "t_more", Icon: LayoutGrid },
];
const MORE_TABS = ["profile", "calc", "products", "micros", "weight", "shopping", "prefs", "settings"];

function BottomNav({ tab, setTab }) {
  const { state } = useStore();
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  return (
    <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#fff",
      borderTop: `1px solid ${t.line}`, display: "flex", maxWidth: 480, margin: "0 auto",
      paddingBottom: "env(safe-area-inset-bottom)", zIndex: 40, boxShadow: "0 -2px 12px rgba(14,85,89,0.05)" }}>
      {TABS.map(({ id, key, Icon }) => {
        const active = tab === id || (id === "more" && MORE_TABS.includes(tab));
        return (
          <button key={id} onClick={() => setTab(id)}
            style={{ flex: 1, border: "none", background: "none", cursor: "pointer", padding: "8px 1px 9px",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3, color: active ? t.coral : t.muted }}>
            <Icon size={21} strokeWidth={active ? 2.4 : 1.9} />
            <span style={{ fontSize: 10, fontWeight: active ? 700 : 500, textAlign: "center" }}>{tr(key)}</span>
          </button>
        );
      })}
    </nav>
  );
}

/* ============================================================
   ROOT
   ============================================================ */
function AppInner() {
  const [tab, setTab] = useState("diary");
  const { state, loaded } = useStore();
  const L = state.lang; const tr = (k) => STR[L][k] ?? k;
  const titleKey = ({ prefs: "preferences" }[tab]) || ("title_" + tab);
  const title = tr(titleKey);
  const name = state.profile?.name;
  const [showSetup, setShowSetup] = useState(false);
  useEffect(() => {
    if (loaded && !state.profile?.name && !state.profileSetupDone) setShowSetup(true);
  }, [loaded]);

  return (
    <div style={{ fontFamily: FONT, background: t.bgSoft, minHeight: "100vh", maxWidth: 480, margin: "0 auto", position: "relative" }}>
      <style>{`
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { opacity: 1; }
        ::-webkit-scrollbar { width: 0; height: 0; }
        button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid ${t.coral}; outline-offset: 1px; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: .6 } to { transform: translateY(0); opacity: 1 } }
        @keyframes spin { to { transform: rotate(360deg) } }
        .spin { animation: spin 1s linear infinite; }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
      `}</style>

      <header style={{ position: "sticky", top: 0, zIndex: 30, background: t.tealDark, color: "#fff",
        padding: "16px 18px", boxShadow: "0 2px 8px rgba(14,85,89,0.12)" }}>
        <div style={{ fontSize: 12, opacity: 0.8, fontWeight: 500 }}>{name ? `${tr("hello")}, ${name}` : tr("appKicker")}</div>
        <div style={{ fontSize: 21, fontWeight: 800, marginTop: 2 }}>{title}</div>
      </header>

      <main style={{ padding: "16px 14px 96px" }}>
        {!loaded ? <div style={{ padding: 60, textAlign: "center", color: t.muted }}>…</div> : (
          <>
            {tab === "diary" && <DiaryScreen />}
            {tab === "recipes" && <RecipesScreen />}
            {tab === "week" && <WeekScreen />}
            {tab === "ai" && <AIChatScreen />}
            {tab === "more" && <MoreScreen go={setTab} />}
            {tab === "profile" && <ProfileScreen />}
            {tab === "calc" && <CalculatorScreen />}
            {tab === "products" && <ProductsScreen />}
            {tab === "micros" && <MicrosScreen />}
            {tab === "weight" && <WeightScreen />}
            {tab === "shopping" && <ShoppingScreen />}
            {tab === "prefs" && <PreferencesScreen />}
            {tab === "settings" && <SettingsScreen />}
          </>
        )}
      </main>

      {showSetup && <ProfileSetupModal onClose={() => setShowSetup(false)} />}

      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

export default function App() {
  return (
    <StoreProvider>
      <AppInner />
    </StoreProvider>
  );
}


createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
